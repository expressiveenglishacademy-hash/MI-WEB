<!DOCTYPE html>

<head>
  <title>Galería - Expressive English Academy</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0a1f44;
      color: white;
    }

    header {
      background: #081633;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      color: #00c3ff;
    }

    .title {
      text-align: center;
      padding: 30px 20px 10px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .gallery img {
      width: 100%;
      border-radius: 15px;
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
    }

    .gallery img:hover {
      transform: scale(1.05);
      box-shadow: 0px 10px 25px rgba(0,0,0,0.5);
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      padding-top: 60px;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.9);
    }

    .modal img {
      display: block;
      margin: auto;
      max-width: 80%;
      border-radius: 10px;
    }

    .modal:target {
      display: block;
    }

  </style>
</head>
