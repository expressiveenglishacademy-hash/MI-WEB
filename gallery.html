<!DOCTYPE html>
<html>
<head>
  <title>Galería - Expressive English Academy</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0a1f44;
      color: white;
    }

    header {
      background: #081633;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      color: #00c3ff;
    }

    .title {
      text-align: center;
      padding: 30px 20px 10px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .gallery img {
      width: 100%;
      border-radius: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
    }

    .modal img {
      max-width: 80%;
      border-radius: 10px;
    }

    .close, .prev, .next {
      position: absolute;
      color: white;
      font-size: 30px;
      cursor: pointer;
      padding: 10px;
      background: rgba(0,0,0,0.5);
      border-radius: 50%;
    }

    .close {
      top: 20px;
      right: 30px;
    }

    .prev {
      top: 50%;
      left: 30px;
      transform: translateY(-50%);
    }

    .next {
      top: 50%;
      right: 30px;
      transform: translateY(-50%);
    }

  </style>
</head>

<body>

<header>
  <h1>Expressive English Academy</h1>

  <nav>
    <a href="index.html">Inicio</a>
    <a href="about.html">Nosotros</a>
    <a href="courses.html">Cursos</a>
    <a href="gallery.html">Galería</a>
    <a href="donate.html">❤️ Apoya</a>
  </nav>

  <img src="fotov6.jpg.jpg" width="80">
</header>

<div class="title">
  <h2>Nuestros estudiantes practicando con hablantes nativos</h2>
  <p>Experiencias reales que fortalecen la confianza y fluidez.</p>
</div>

<div class="gallery">
  <img src="foto1.jpg.jpeg" onclick="openModal(0)">
  <img src="foto2.jpg.jpeg" onclick="openModal(1)">
  <img src="foto3.jpg.jpeg" onclick="openModal(2)">
  <img src="foto4.jpg.jpeg" onclick="openModal(3)">
  <img src="foto10.jpg.png" onclick="openModal(4)">
  <img src="foto11.jpg.png" onclick="openModal(5)">
  <img src="foto12.jpg.png" onclick="openModal(6)">
  <img src="foto13.jpg.jpg" onclick="openModal(7)">
  <img src="foto14.jpg.jpg" onclick="openModal(8)">
  <img src="foto15.jpg.jpg" onclick="openModal(9)">
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <span class="close" onclick="closeModal()">✖</span>
  <span class="prev" onclick="changeSlide(-1)">❮</span>
  <img id="modalImg">
  <span class="next" onclick="changeSlide(1)">❯</span>
</div>

<script>
  let images = [
    "foto1.jpg.jpeg",
    "foto2.jpg.jpeg",
    "foto3.jpg.jpeg",
    "foto4.jpg.jpeg",
    "foto10.jpg.png",
    "foto11.jpg.png",
    "foto12.jpg.png",
    "foto13.jpg.jpg",
    "foto14.jpg.jpg",
    "foto15.jpg.jpg"
  ];

  let currentIndex = 0;

  function openModal(index) {
    currentIndex = index;
    document.getElementById("modal").style.display = "flex";
    document.getElementById("modalImg").src = images[currentIndex];
  }

  function closeModal() {
    document.getElementById("modal").style.display = "none";
  }

  function changeSlide(direction) {
    currentIndex += direction;

    if (currentIndex < 0) {
      currentIndex = images.length - 1;
    }

    if (currentIndex >= images.length) {
      currentIndex = 0;
    }

    document.getElementById("modalImg").src = images[currentIndex];
  }
</script>
